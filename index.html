<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Landing Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4a90e2, #50c9c3);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      max-width: 520px;
      width: 100%;
    }
    h1 {
      margin: 0 0 20px;
      font-size: 3rem;
      letter-spacing: 1px;
    }
    p {
      margin: 0 0 30px;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      padding: 14px 28px;
      background: #fff;
      color: #333;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .button:hover {
      background: #f1f1f1;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, welcome!</h1>
    <p>This is a simple landing page to greet your visitors and introduce your project in a clean, modern style.</p>
    <a class="button" href="#">Get Started</a>
  </div>
</body>
</html>
